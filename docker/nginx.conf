server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;
    client_max_body_size 64k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;

    location = /api/v1/events {
        proxy_pass http://backend:8615;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8615;
        proxy_set_header Origin http://127.0.0.1:8615;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://backend:8615;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8615;
        proxy_set_header Origin http://127.0.0.1:8615;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15m;
        proxy_send_timeout 15m;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
